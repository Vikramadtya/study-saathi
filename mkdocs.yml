site_name: Study Sathi

theme:
  name: material
  
  # 1. ENHANCED FEATURES: This makes it feel like a modern web app, not just a document.
  features:
    - navigation.tabs # Moves top-level folders to a sleek top navigation bar
    - navigation.tabs.sticky # Keeps the top bar visible when scrolling down
    - navigation.sections # Groups sub-pages elegantly in the sidebar
    - navigation.top # Adds a smooth "back to top" button for long pages
    - navigation.tracking # Updates the URL hash as the user scrolls through sections
    - search.suggest # Auto-suggests results as the user types in the search bar
    - search.highlight # Highlights the searched terms on the destination page
    - content.code.copy # Adds a clean "copy to clipboard" button on code blocks
    - content.code.annotate # Allows adding interactive, clickable notes to code blocks
    - content.tabs.link # If a user clicks a "Python" tab on one page, it auto-selects Python everywhere
    - content.tooltips


  # 2. REFINED PALETTE: Added OS-level auto-detection for a seamless first impression.
  palette:
    # Auto-detects the user's OS preference first
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Light Mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # Swapped blue for indigo for a slightly more modern, vibrant tech feel
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal # Swapped green for teal to provide better contrast against the dark slate background
      accent: cyan # Swapped deep purple for cyan so accents pop clearly in the dark
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference

  font:
    # Retaining your highly readable, psychology-backed font choices
    text: Lora
    code: Atkinson Hyperlegible
    
  logo: assets/logo.svg
  favicon: assets/favicon.ico

plugins:
  - social
  - tags
  - glightbox




# 3. POWER-UP MARKDOWN: Added essential plugins for beautiful documentation elements.
markdown_extensions:
  - toc:
      permalink: true # Adds a neat little clickable anchor link "¶" next to headers when hovering
  - admonition # Enables beautiful callout boxes (Notes, Warnings, Tips)
  - attr_list
  - md_in_html
  - pymdownx.details # Allows making those callout boxes collapsible
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences: # Unlocks Mermaid.js so you can generate beautiful diagrams via code
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true # Upgrades tabs to look like modern grouped buttons
  - pymdownx.tasklist:
      custom_checkbox: true # Makes markdown checklists look like native UI checkboxes
  - pymdownx.mark # Allows you to highlight text ==like this==
  - pymdownx.blocks.caption
  - abbr
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.tilde
  - footnotes
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@james-willett
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/willettjames

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
